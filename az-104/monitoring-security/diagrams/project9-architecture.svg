<svg width="100%" viewBox="0 0 720 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AZ-104 Phase 3 Project 9 — Azure Monitor Architecture</title>
  <desc>Architecture showing vm-linux-dev-wus3-01 and vm-win-dev-wus3-01 sending metrics and logs via AMA and DCR to Log Analytics Workspace, which feeds alert rules triggering action group email notifications.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-alert" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-notify" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #64748b; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 500; }
      .sub  { font-size: 10px; }
      .row  { font-size: 10px; }
      .conn-data   { stroke: #3b82f6; stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; }
      .conn-alert  { stroke: #f87171; stroke-width: 1.5; fill: none; }
      .conn-notify { stroke: #34d399; stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="720" height="640" fill="#0f1117"/>

  <!-- header stripe — teal for monitoring -->
  <rect x="0" y="0" width="720" height="3" fill="#2dd4bf"/>

  <!-- header -->
  <rect x="0" y="3" width="720" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="720" height="1" fill="#2a3347"/>
  <text x="20" y="28" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Phase 3 · Project 9</text>
  <text x="20" y="42" class="sub" fill="#64748b">Azure Monitor · AMA + DCR · Log Analytics · Alerts</text>
  <rect x="528" y="12" width="172" height="22" rx="11" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="614" y="27" text-anchor="middle" class="sub" fill="#5eead4">phase-3 · project-9</text>

  <!-- ── RESOURCE GROUP boundary ── -->
  <rect x="16" y="60" width="688" height="524" rx="12" fill="#161b27" stroke="#2a3347" stroke-width="0.5"/>
  <text x="30" y="79" class="cap sans" fill="#94a3b8" font-size="10">rg-az104-dev-wus3-01  ·  West US 3</text>

  <!-- ── LINUX VM ── -->
  <rect x="28" y="88" width="204" height="188" rx="10" fill="#1d2435" stroke="#2a3347" stroke-width="0.5"/>
  <rect x="28" y="88" width="204" height="3" rx="2" fill="#94a3b8"/>
  <text x="130" y="107" text-anchor="middle" class="sans nm" fill="#e2e8f0" font-size="12" font-weight="600">vm-linux-dev-wus3-01</text>
  <text x="130" y="121" text-anchor="middle" class="sub" fill="#64748b">Ubuntu 24.04 · Standard B2s</text>
  <line x1="28" y1="128" x2="232" y2="128" stroke="#2a3347" stroke-width="0.5"/>

  <!-- AMA Linux -->
  <rect x="40" y="134" width="180" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="130" y="148" text-anchor="middle" class="sub" fill="#93c5fd">AzureMonitorLinuxAgent</text>
  <text x="130" y="160" text-anchor="middle" class="row" fill="#64748b">v1.0 · auto-upgrade</text>

  <!-- MDE Linux -->
  <rect x="40" y="168" width="180" height="22" rx="4" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="130" y="183" text-anchor="middle" class="row" fill="#d8b4fe">MDE.Linux · Defender</text>

  <!-- Data streams -->
  <rect x="40" y="198" width="84" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="82" y="213" text-anchor="middle" class="sub" fill="#93c5fd">Perf</text>
  <text x="82" y="227" text-anchor="middle" class="row" fill="#64748b">60s sample</text>

  <rect x="136" y="198" width="84" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="178" y="213" text-anchor="middle" class="sub" fill="#93c5fd">Syslog</text>
  <text x="178" y="227" text-anchor="middle" class="row" fill="#64748b">warn+</text>

  <!-- no public IP -->
  <rect x="40" y="242" width="180" height="26" rx="4" fill="#242c40" stroke="#364259" stroke-width="0.5"/>
  <text x="130" y="252" text-anchor="middle" class="row" fill="#94a3b8">no public IP</text>
  <text x="130" y="264" text-anchor="middle" class="row" fill="#94a3b8">managed identity: system</text>

  <!-- ── WINDOWS VM ── -->
  <rect x="28" y="292" width="204" height="188" rx="10" fill="#1d2435" stroke="#2a3347" stroke-width="0.5"/>
  <rect x="28" y="292" width="204" height="3" rx="2" fill="#94a3b8"/>
  <text x="130" y="311" text-anchor="middle" class="sans nm" fill="#e2e8f0" font-size="12" font-weight="600">vm-win-dev-wus3-01</text>
  <text x="130" y="325" text-anchor="middle" class="sub" fill="#64748b">Windows Server 2025 · B2s</text>
  <line x1="28" y1="332" x2="232" y2="332" stroke="#2a3347" stroke-width="0.5"/>

  <!-- AMA Windows -->
  <rect x="40" y="338" width="180" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="130" y="352" text-anchor="middle" class="sub" fill="#93c5fd">AzureMonitorWindowsAgent</text>
  <text x="130" y="364" text-anchor="middle" class="row" fill="#64748b">v1.0 · auto-upgrade</text>

  <!-- MDE Windows -->
  <rect x="40" y="372" width="180" height="22" rx="4" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="130" y="387" text-anchor="middle" class="row" fill="#d8b4fe">MDE.Windows · Defender</text>

  <!-- Data streams -->
  <rect x="40" y="402" width="84" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="82" y="417" text-anchor="middle" class="sub" fill="#93c5fd">Perf</text>
  <text x="82" y="431" text-anchor="middle" class="row" fill="#64748b">60s sample</text>

  <rect x="136" y="402" width="84" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="178" y="417" text-anchor="middle" class="sub" fill="#93c5fd">Event Log</text>
  <text x="178" y="431" text-anchor="middle" class="row" fill="#64748b">warn+</text>

  <!-- no public IP -->
  <rect x="40" y="446" width="180" height="26" rx="4" fill="#242c40" stroke="#364259" stroke-width="0.5"/>
  <text x="130" y="456" text-anchor="middle" class="row" fill="#94a3b8">no public IP</text>
  <text x="130" y="468" text-anchor="middle" class="row" fill="#94a3b8">managed identity: system</text>

  <!-- ── DCR ── -->
  <rect x="256" y="168" width="168" height="142" rx="10" fill="#1d2435" stroke="#3b82f6" stroke-width="0.5"/>
  <rect x="256" y="168" width="168" height="3" rx="2" fill="#3b82f6"/>
  <text x="340" y="187" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="11" font-weight="600">dcr-az104-dev-wus3-01</text>
  <text x="340" y="201" text-anchor="middle" class="sub" fill="#64748b">Data Collection Rule</text>
  <line x1="256" y1="208" x2="424" y2="208" stroke="#2a3347" stroke-width="0.5"/>

  <rect x="268" y="214" width="144" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="340" y="229" text-anchor="middle" class="sub" fill="#93c5fd">Microsoft-Perf</text>

  <rect x="268" y="242" width="144" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="340" y="257" text-anchor="middle" class="sub" fill="#93c5fd">Microsoft-Syslog</text>

  <rect x="268" y="270" width="144" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="340" y="285" text-anchor="middle" class="sub" fill="#93c5fd">Microsoft-Event</text>

  <!-- ── LAW ── -->
  <rect x="452" y="68" width="236" height="300" rx="10" fill="#1d2435" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="452" y="68" width="236" height="3" rx="2" fill="#2dd4bf"/>
  <text x="570" y="88" text-anchor="middle" class="sans nm" fill="#5eead4" font-size="12" font-weight="600">law-az104-dev-wus03-01</text>
  <text x="570" y="102" text-anchor="middle" class="sub" fill="#64748b">Log Analytics Workspace</text>
  <text x="570" y="116" text-anchor="middle" class="sub" fill="#64748b">30d retention · PerGB2018</text>
  <line x1="452" y1="122" x2="688" y2="122" stroke="#2a3347" stroke-width="0.5"/>

  <!-- LAW tables -->
  <rect x="464" y="130" width="96" height="44" rx="6" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="512" y="149" text-anchor="middle" class="sub" fill="#5eead4">Heartbeat</text>
  <text x="512" y="164" text-anchor="middle" class="row" fill="#64748b">VM availability</text>

  <rect x="572" y="130" width="96" height="44" rx="6" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="620" y="149" text-anchor="middle" class="sub" fill="#5eead4">Perf</text>
  <text x="620" y="164" text-anchor="middle" class="row" fill="#64748b">CPU · mem · disk</text>

  <rect x="464" y="184" width="96" height="44" rx="6" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="512" y="203" text-anchor="middle" class="sub" fill="#5eead4">Syslog</text>
  <text x="512" y="218" text-anchor="middle" class="row" fill="#64748b">Linux logs</text>

  <rect x="572" y="184" width="96" height="44" rx="6" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="620" y="203" text-anchor="middle" class="sub" fill="#5eead4">Event</text>
  <text x="620" y="218" text-anchor="middle" class="row" fill="#64748b">Windows events</text>

  <!-- KQL -->
  <rect x="464" y="240" width="204" height="114" rx="6" fill="#1c1209" stroke="#f59e0b" stroke-width="0.5"/>
  <rect x="464" y="240" width="204" height="3" rx="2" fill="#f59e0b"/>
  <text x="566" y="258" text-anchor="middle" class="sub" fill="#fcd34d">KQL queries</text>
  <line x1="464" y1="264" x2="668" y2="264" stroke="#292008" stroke-width="0.5"/>
  <text x="472" y="278" class="row" fill="#fcd34d">Heartbeat | summarize</text>
  <text x="472" y="292" class="row" fill="#fcd34d">  max(TimeGenerated)</text>
  <text x="472" y="306" class="row" fill="#fcd34d">  by Computer</text>
  <text x="472" y="320" class="row" fill="#fcd34d">Perf | where CounterName</text>
  <text x="472" y="334" class="row" fill="#fcd34d">  == "% Processor Time"</text>
  <text x="472" y="348" class="row" fill="#64748b">  | where CounterValue > 80</text>

  <!-- ── ALERT RULES ── -->
  <rect x="256" y="392" width="420" height="80" rx="10" fill="#1d2435" stroke="#f87171" stroke-width="0.5"/>
  <rect x="256" y="392" width="420" height="3" rx="2" fill="#f87171"/>
  <text x="466" y="411" text-anchor="middle" class="sans nm" fill="#fca5a5" font-size="12" font-weight="600">Alert Rules</text>
  <line x1="256" y1="418" x2="676" y2="418" stroke="#2a3347" stroke-width="0.5"/>

  <rect x="268" y="424" width="190" height="36" rx="6" fill="#450a0a" stroke="#f87171" stroke-width="0.5"/>
  <text x="363" y="440" text-anchor="middle" class="sub" fill="#fca5a5">alert-cpu-high-linux</text>
  <text x="363" y="454" text-anchor="middle" class="row" fill="#64748b">CPU &gt; 80% · 5min · sev2</text>

  <rect x="470" y="424" width="194" height="36" rx="6" fill="#450a0a" stroke="#f87171" stroke-width="0.5"/>
  <text x="567" y="440" text-anchor="middle" class="sub" fill="#fca5a5">alert-heartbeat-vms</text>
  <text x="567" y="454" text-anchor="middle" class="row" fill="#64748b">heartbeat &lt; 1 · 5min · sev1</text>

  <!-- ── ACTION GROUP ── -->
  <rect x="256" y="488" width="420" height="68" rx="10" fill="#1d2435" stroke="#34d399" stroke-width="0.5"/>
  <rect x="256" y="488" width="420" height="3" rx="2" fill="#34d399"/>
  <text x="466" y="507" text-anchor="middle" class="sans nm" fill="#86efac" font-size="12" font-weight="600">ag-az104-dev-wus3-01</text>
  <text x="466" y="521" text-anchor="middle" class="sub" fill="#64748b">Action Group · email notification on alert fire</text>
  <rect x="390" y="530" width="152" height="20" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="466" y="544" text-anchor="middle" class="row" fill="#86efac">email → djeemunee@...</text>

  <!-- ── CONNECTORS ── -->

  <!-- VMs → DCR (data flow) -->
  <line x1="232" y1="216" x2="256" y2="238" class="conn-data" marker-end="url(#arrow)"/>
  <line x1="232" y1="386" x2="256" y2="290" class="conn-data" marker-end="url(#arrow)"/>
  <text x="242" y="265" class="cap" fill="#3b82f6" font-size="9" transform="rotate(-50 242 265)">DCR assoc</text>

  <!-- DCR → LAW -->
  <line x1="424" y1="240" x2="452" y2="200" class="conn-data" marker-end="url(#arrow)"/>

  <!-- LAW → Alert Rules -->
  <line x1="570" y1="368" x2="466" y2="392" class="conn-alert" marker-end="url(#arrow-alert)"/>

  <!-- Metric alert direct from Linux VM -->
  <line x1="140" y1="276" x2="300" y2="424" class="conn-alert" stroke-dasharray="4 2" marker-end="url(#arrow-alert)"/>
  <text x="186" y="358" class="cap" fill="#f87171" font-size="9" transform="rotate(55 186 358)">metric scope</text>

  <!-- Alert Rules → Action Group -->
  <line x1="466" y1="472" x2="466" y2="488" class="conn-alert" marker-end="url(#arrow-alert)"/>

  <!-- ── FOOTER ── -->
  <rect x="0" y="596" width="720" height="44" fill="#161b27"/>
  <rect x="0" y="596" width="720" height="1" fill="#2a3347"/>
  <text x="360" y="622" text-anchor="middle" class="cap sans" fill="#475569" font-size="10">ostebovik.net · AZ-104 Phase 3 · Project 9 · Azure Monitor Architecture · westus3</text>
</svg>

  <text x="50" y="82" style="font-size:13px;font-weight:600;fill:#fff;">stlabeastus001</text>
  <text x="50" y="96" style="font-size:10px;font-family:monospace;fill:#aed4f5;">Standard_LRS · Hot tier · East US · TLS 1.2</text>
  <text x="536" y="82" text-anchor="end" style="font-size:9px;font-weight:600;letter-spacing:.08em;fill:#aed4f5;">PRIMARY</text>

  <!-- ── Container: uploads ── -->
  <rect x="50" y="106" width="220" height="190" rx="9" fill="#fff" fill-opacity="0.75" stroke="#0a7e6e" stroke-width="1"/>
  <text x="64" y="124" style="font-size:11px;font-weight:500;fill:#0a7e6e;">uploads</text>
  <text x="64" y="138" style="font-size:10px;font-family:monospace;fill:#0a7e6e;">Private · 5 blobs</text>

  <!-- Blob items -->
  <rect x="64" y="146" width="192" height="20" rx="4" fill="#e6f5f3" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="72" y="160" style="font-size:10px;font-family:monospace;fill:#085041;">testfile1.txt</text>
  <text x="240" y="160" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#0a7e6e;">Hot</text>

  <rect x="64" y="170" width="192" height="20" rx="4" fill="#e6f5f3" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="72" y="184" style="font-size:10px;font-family:monospace;fill:#085041;">testfile2.txt</text>
  <text x="240" y="184" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#0a7e6e;">Hot</text>

  <rect x="64" y="194" width="192" height="20" rx="4" fill="#e6f5f3" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="72" y="208" style="font-size:10px;font-family:monospace;fill:#085041;">testfile3.txt</text>
  <text x="240" y="208" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#0a7e6e;">Hot</text>

  <rect x="64" y="218" width="192" height="20" rx="4" fill="#e6f5f3" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="72" y="232" style="font-size:10px;font-family:monospace;fill:#085041;">testfile4.json</text>
  <text x="240" y="232" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#0a7e6e;">Hot</text>

  <rect x="64" y="242" width="192" height="20" rx="4" fill="#e6f5f3" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="72" y="256" style="font-size:10px;font-family:monospace;fill:#085041;">testfile5.json</text>
  <text x="240" y="256" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#0a7e6e;">Hot</text>

  <!-- Soft delete note -->
  <rect x="64" y="270" width="192" height="18" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="160" y="282" text-anchor="middle" style="font-size:9px;fill:#1d4ed8;">Soft delete: 7 day retention</text>

  <!-- ── Container: archive ── -->
  <rect x="50" y="308" width="220" height="80" rx="9" fill="#fff" fill-opacity="0.75" stroke="#534AB7" stroke-width="1"/>
  <text x="64" y="326" style="font-size:11px;font-weight:500;fill:#534AB7;">archive</text>
  <text x="64" y="340" style="font-size:10px;font-family:monospace;fill:#534AB7;">Private · lifecycle demo</text>
  <rect x="64" y="348" width="192" height="20" rx="4" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="72" y="362" style="font-size:10px;font-family:monospace;fill:#3C3489;">archive-testfile1.txt</text>
  <text x="250" y="362" text-anchor="end" style="font-size:9px;font-family:monospace;fill:#534AB7;">Hot</text>

  <!-- ── Container: $web ── -->
  <rect x="50" y="400" width="220" height="98" rx="9" fill="#fff" fill-opacity="0.75" stroke="#d83b01" stroke-width="1"/>
  <text x="64" y="418" style="font-size:11px;font-weight:500;fill:#d83b01;">$web</text>
  <text x="64" y="432" style="font-size:10px;font-family:monospace;fill:#d83b01;">Static website container</text>
  <rect x="64" y="440" width="192" height="20" rx="4" fill="#fef3ee" stroke="#f5c4b3" stroke-width="0.5"/>
  <text x="72" y="454" style="font-size:10px;font-family:monospace;fill:#712B13;">index.html</text>
  <rect x="64" y="464" width="192" height="20" rx="4" fill="#fef3ee" stroke="#f5c4b3" stroke-width="0.5"/>
  <text x="72" y="478" style="font-size:10px;font-family:monospace;fill:#712B13;">404.html</text>

  <!-- ══════════════════════════════════════
       RIGHT PANEL: Access methods + lifecycle
  ══════════════════════════════════════ -->

  <!-- Access methods panel -->
  <rect x="290" y="106" width="240" height="280" rx="9" fill="#fff" fill-opacity="0.75" stroke="#185FA5" stroke-width="1"/>
  <text x="304" y="124" style="font-size:11px;font-weight:500;fill:#185FA5;">Access methods</text>

  <!-- Account key -->
  <rect x="304" y="132" width="212" height="52" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="316" y="148" style="font-size:10px;font-weight:500;fill:#185FA5;">Account keys (Key 1 + Key 2)</text>
  <text x="316" y="161" style="font-size:9px;font-family:monospace;fill:#378ADD;">Full admin access · rotate independently</text>
  <text x="316" y="173" style="font-size:9px;font-family:monospace;fill:#378ADD;">Zero-downtime rotation pattern</text>

  <!-- Ad-hoc SAS -->
  <rect x="304" y="192" width="212" height="52" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="316" y="208" style="font-size:10px;font-weight:500;fill:#92400e;">Ad-hoc SAS token</text>
  <text x="316" y="221" style="font-size:9px;font-family:monospace;fill:#92400e;">Read-only · 2hr expiry · HTTPS only</text>
  <text x="316" y="233" style="font-size:9px;font-family:monospace;fill:#b45309;">Cannot be revoked before expiry</text>

  <!-- Stored policy SAS -->
  <rect x="304" y="252" width="212" height="52" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="316" y="268" style="font-size:10px;font-weight:500;fill:#166534;">Stored access policy SAS</text>
  <text x="316" y="281" style="font-size:9px;font-family:monospace;fill:#166534;">read-policy-30d · Read+List</text>
  <text x="316" y="293" style="font-size:9px;font-family:monospace;fill:#166534;">Revoke policy → all tokens invalid</text>

  <!-- Managed identity note -->
  <rect x="304" y="312" width="212" height="34" rx="6" fill="#f5f4ef" stroke="#d4d3cc" stroke-width="0.5"/>
  <text x="316" y="327" style="font-size:9px;font-family:monospace;fill:#6b6b64;">Production: use Managed Identity</text>
  <text x="316" y="339" style="font-size:9px;font-family:monospace;fill:#6b6b64;">(no keys/tokens stored in code)</text>

  <!-- Lifecycle policy panel -->
  <rect x="290" y="398" width="240" height="112" rx="9" fill="#fff" fill-opacity="0.75" stroke="#534AB7" stroke-width="1"/>
  <text x="304" y="416" style="font-size:11px;font-weight:500;fill:#534AB7;">Lifecycle management policy</text>
  <text x="304" y="430" style="font-size:9px;font-family:monospace;fill:#6b6b64;">uploads/ prefix · runs daily</text>

  <!-- Tier progression boxes -->
  <rect x="304" y="438" width="46" height="32" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="327" y="451" text-anchor="middle" style="font-size:9px;font-weight:500;fill:#185FA5;">Hot</text>
  <text x="327" y="463" text-anchor="middle" style="font-size:8px;font-family:monospace;fill:#378ADD;">0d</text>

  <line x1="350" y1="454" x2="358" y2="454" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="360" y="438" width="46" height="32" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="383" y="451" text-anchor="middle" style="font-size:9px;font-weight:500;fill:#1d4ed8;">Cool</text>
  <text x="383" y="463" text-anchor="middle" style="font-size:8px;font-family:monospace;fill:#1d4ed8;">30d</text>

  <line x1="406" y1="454" x2="414" y2="454" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="416" y="438" width="52" height="32" rx="5" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.75"/>
  <text x="442" y="451" text-anchor="middle" style="font-size:9px;font-weight:500;fill:#3C3489;">Archive</text>
  <text x="442" y="463" text-anchor="middle" style="font-size:8px;font-family:monospace;fill:#534AB7;">90d</text>

  <line x1="468" y1="454" x2="476" y2="454" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="478" y="438" width="46" height="32" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.75"/>
  <text x="501" y="451" text-anchor="middle" style="font-size:9px;font-weight:500;fill:#991b1b;">Delete</text>
  <text x="501" y="463" text-anchor="middle" style="font-size:8px;font-family:monospace;fill:#c0392b;">365d</text>

  <text x="410" y="500" text-anchor="middle" style="font-size:9px;fill:#6b6b64;">archive/ prefix: 7d→Cool · 30d→Archive · 180d→Delete</text>


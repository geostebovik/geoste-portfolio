  <line x1="760" y1="433" x2="772" y2="433" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="774" y="408" width="80" height="50" rx="6" fill="#fff" fill-opacity="0.8" stroke="#378ADD" stroke-width="0.75"/>
  <text x="814" y="428" text-anchor="middle" style="font-size:9px;fill:#185FA5;">Rack 3</text>
  <text x="814" y="442" text-anchor="middle" style="font-size:9px;font-family:monospace;fill:#378ADD;">Copy 3</text>

  <text x="719" y="478" text-anchor="middle" style="font-size:9px;fill:#6b6b64;">11 nines durability (99.999999999%)</text>
  <text x="719" y="492" text-anchor="middle" style="font-size:9px;fill:#6b6b64;">Survives: drive failure, rack failure · Not: datacenter loss</text>
  <text x="719" y="506" text-anchor="middle" style="font-size:9px;fill:#6b6b64;">GRS adds 3 more copies in West US 2 → 16 nines</text>


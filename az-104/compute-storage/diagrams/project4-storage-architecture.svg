  <text x="586" y="399" style="font-size:9px;font-family:monospace;fill:#378ADD;">3 synchronous copies within one datacenter</text>

  <rect x="586" y="408" width="80" height="50" rx="6" fill="#fff" fill-opacity="0.8" stroke="#378ADD" stroke-width="0.75"/>

  <text x="626" y="442" text-anchor="middle" style="font-size:9px;font-family:monospace;fill:#378ADD;">Copy 1</text>

  <line x1="666" y1="433" x2="678" y2="433" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)"/>


<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>Azure Storage Architecture — Project 4</title>
  <desc>Architecture diagram showing stlabeastus001 (LRS) and stlabgrs001 (GRS) storage accounts with containers, access methods including account keys, ad-hoc SAS, policy SAS, and lifecycle management tiers from Hot to Cool to Archive to Delete. Static website hosting shown on the $web container.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f7f6f2"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" style="font-size:15px;font-weight:600;fill:#1a1a18;">Azure Storage Architecture — Project 4</text>
  <text x="450" y="46" text-anchor="middle" style="font-size:11px;fill:#6b6b64;">Storage accounts · access control · lifecycle tiers · static website</text>

  <!-- ══════════════════════════════════════
       LEFT: stlabeastus001 (LRS)
  ══════════════════════════════════════ -->

  <!-- Outer account box -->
  <rect x="30" y="62" width="520" height="448" rx="14" fill="#E6F1FB" fill-opacity="0.5" stroke="#185FA5" stroke-width="1.5"/>
  <rect x="30" y="62" width="520" height="32" rx="14" fill="#185FA5"/>

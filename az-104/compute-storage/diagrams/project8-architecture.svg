<svg viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>P8 App Service and Container Instance — westus3</title>
  <desc>Architecture showing App Service Plan with web app containing production and staging deployment slots, plus Azure Container Instance running nginx. Includes policy badge, slot swap mechanism, and App Service vs ACI comparison.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #475569; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 600; }
      .sub  { font-size: 10px; }
      .row  { font-size: 9px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="680" height="700" fill="#0f1117"/>

  <!-- header stripe -->
  <rect x="0" y="0" width="680" height="3" fill="#4a9eff"/>

  <!-- header -->
  <rect x="0" y="3" width="680" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="680" height="1" fill="#2a3347"/>
  <text x="16" y="26" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Project 8</text>
  <text x="16" y="41" class="sub" fill="#64748b">App Service · deployment slots · slot swap · Container Instance · westus3</text>
  <rect x="524" y="12" width="140" height="22" rx="11" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="594" y="27" text-anchor="middle" class="sub" fill="#93c5fd">project-8 · app service</text>

  <!-- RG outer -->
  <rect x="16" y="56" width="648" height="600" rx="12" fill="#161b27" stroke="#2a3347" stroke-width="1"/>
  <text x="30" y="74" class="sans nm" fill="#94a3b8" font-size="11">rg-az104-dev-wus3-01</text>
  <text x="30" y="87" class="row" fill="#475569">resource group · westus3</text>

  <!-- Policy badge -->
  <rect x="444" y="60" width="208" height="34" rx="8" fill="#1a0e35" stroke="#a78bfa" stroke-width="0.75"/>
  <text x="548" y="74" text-anchor="middle" class="sub" fill="#c4b5fd" font-weight="600">10 policies assigned</text>
  <text x="548" y="87" text-anchor="middle" class="row" fill="#64748b">tags · locations · App Service</text>

  <!-- APP SERVICE PLAN -->
  <rect x="30" y="102" width="400" height="466" rx="10" fill="#161b27" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="30" y="102" width="400" height="28" rx="10" fill="#1e3a5f"/>
  <rect x="30" y="118" width="400" height="12" fill="#1e3a5f"/>
  <text x="44" y="120" class="sans nm" fill="#93c5fd" font-size="12">asp-dev-wus3-01</text>
  <text x="44" y="133" class="row" fill="#64748b">App Service Plan · Linux · P0v3 · ~$41/mo</text>

  <!-- Web App container -->
  <rect x="44" y="142" width="372" height="412" rx="8" fill="#1d2435" stroke="#64748b" stroke-width="0.75"/>
  <rect x="44" y="142" width="372" height="3" rx="2" fill="#64748b"/>
  <text x="230" y="161" text-anchor="middle" class="sans nm" fill="#e2e8f0" font-size="11">app-dev-wus3-01</text>
  <text x="230" y="175" text-anchor="middle" class="row" fill="#64748b">Web App · Python 3.11 · Linux · HTTPS only</text>

  <!-- identity + settings badges -->
  <rect x="58" y="182" width="156" height="20" rx="5" fill="#1a0e35" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="136" y="196" text-anchor="middle" class="row" fill="#c4b5fd">system managed identity</text>
  <rect x="224" y="182" width="178" height="20" rx="5" fill="#1a0e35" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="313" y="196" text-anchor="middle" class="row" fill="#c4b5fd">app settings · slot-sticky vars</text>

  <!-- Production slot -->
  <rect x="58" y="212" width="344" height="126" rx="7" fill="#0d2e1a" stroke="#34d399" stroke-width="1"/>
  <rect x="58" y="212" width="344" height="3" rx="2" fill="#34d399"/>
  <text x="230" y="230" text-anchor="middle" class="sans nm" fill="#34d399" font-size="11">production slot</text>
  <text x="230" y="244" text-anchor="middle" class="row" fill="#64748b">ENVIRONMENT=production · slot-sticky</text>
  <text x="230" y="256" text-anchor="middle" class="row" fill="#64748b">version 1 → version 2 after swap</text>
  <rect x="70" y="262" width="320" height="18" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.4"/>
  <text x="230" y="275" text-anchor="middle" class="row" fill="#86efac">app-dev-wus3-01-c8azd6d...azurewebsites.net</text>
  <rect x="70" y="284" width="152" height="18" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.4"/>
  <text x="146" y="297" text-anchor="middle" class="row" fill="#86efac">gunicorn · Flask</text>
  <rect x="232" y="284" width="158" height="18" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.4"/>
  <text x="311" y="297" text-anchor="middle" class="row" fill="#86efac">zip deploy · Kudu API</text>
  <text x="230" y="317" text-anchor="middle" class="row" fill="#64748b">Slot-sticky: config stays in slot · code moves on swap</text>
  <text x="230" y="329" text-anchor="middle" class="row" fill="#64748b">Forgetting sticky causes env var to follow code to prod</text>

  <!-- swap indicator -->
  <rect x="58" y="348" width="344" height="20" rx="5" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="230" y="362" text-anchor="middle" class="row" fill="#93c5fd">⟷ slot swap — zero downtime · instant rollback · warm-up before cutover</text>

  <!-- Staging slot -->
  <rect x="58" y="378" width="344" height="106" rx="7" fill="#1c1209" stroke="#f59e0b" stroke-width="1"/>
  <rect x="58" y="378" width="344" height="3" rx="2" fill="#f59e0b"/>
  <text x="230" y="397" text-anchor="middle" class="sans nm" fill="#fcd34d" font-size="11">staging slot</text>
  <text x="230" y="411" text-anchor="middle" class="row" fill="#64748b">ENVIRONMENT=staging · slot-sticky</text>
  <text x="230" y="423" text-anchor="middle" class="row" fill="#64748b">version 2 before swap</text>
  <rect x="70" y="430" width="320" height="18" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="0.4"/>
  <text x="230" y="443" text-anchor="middle" class="row" fill="#fcd34d">app-dev-wus3-01-staging-...azurewebsites.net</text>
  <rect x="70" y="452" width="152" height="18" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="0.4"/>
  <text x="146" y="465" text-anchor="middle" class="row" fill="#fcd34d">isolated traffic</text>
  <rect x="232" y="452" width="158" height="18" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="0.4"/>
  <text x="311" y="465" text-anchor="middle" class="row" fill="#fcd34d">pre-production test</text>
  <text x="230" y="477" text-anchor="middle" class="row" fill="#64748b">P0v3 minimum · Basic SKU listed as Legacy in portal</text>

  <!-- startup command -->
  <rect x="58" y="494" width="344" height="20" rx="4" fill="#1e2e4a" stroke="#4a9eff" stroke-width="0.4"/>
  <text x="230" y="508" text-anchor="middle" class="row" fill="#60a5fa">gunicorn --bind=0.0.0.0 --timeout 600 app:app</text>

  <!-- CONTAINER INSTANCE -->
  <rect x="446" y="102" width="218" height="230" rx="10" fill="#161b27" stroke="#f87171" stroke-width="1.5"/>
  <rect x="446" y="102" width="218" height="28" rx="10" fill="#450a0a"/>
  <rect x="446" y="118" width="218" height="12" fill="#450a0a"/>
  <text x="555" y="120" text-anchor="middle" class="sans nm" fill="#fca5a5" font-size="12">aci-dev-wus3-01</text>
  <text x="555" y="133" text-anchor="middle" class="row" fill="#64748b">Container Instance · westus3</text>

  <rect x="460" y="144" width="190" height="38" rx="6" fill="#1c0909" stroke="#f87171" stroke-width="0.5"/>
  <text x="555" y="160" text-anchor="middle" class="sub" fill="#fca5a5" font-weight="600">nginx:latest</text>
  <text x="555" y="175" text-anchor="middle" class="row" fill="#64748b">Docker Hub · public image</text>

  <rect x="460" y="188" width="190" height="18" rx="4" fill="#1c0909" stroke="#f87171" stroke-width="0.4"/>
  <text x="555" y="201" text-anchor="middle" class="row" fill="#fca5a5">CPU: 1 · Memory: 1.5 GB · Linux</text>

  <rect x="460" y="210" width="190" height="18" rx="4" fill="#1c0909" stroke="#f87171" stroke-width="0.4"/>
  <text x="555" y="223" text-anchor="middle" class="row" fill="#fca5a5">port 80 · public IP</text>

  <rect x="460" y="232" width="190" height="30" rx="4" fill="#1c0909" stroke="#f87171" stroke-width="0.4"/>
  <text x="555" y="246" text-anchor="middle" class="row" fill="#64748b">aci-az104-ostebovik</text>
  <text x="555" y="258" text-anchor="middle" class="row" fill="#64748b">.westus3.azurecontainer.io</text>

  <text x="555" y="296" text-anchor="middle" class="row" fill="#475569">independent resource</text>

  <!-- ACI vs App Service comparison -->
  <rect x="446" y="348" width="218" height="196" rx="8" fill="#161b27" stroke="#2a3347" stroke-width="0.75"/>
  <text x="555" y="367" text-anchor="middle" class="sub" fill="#94a3b8" font-weight="600">ACI vs App Service</text>
  <rect x="446" y="372" width="218" height="1" fill="#2a3347"/>
  <text x="460" y="390" class="row" fill="#34d399">✓ pay per second · no plan</text>
  <text x="460" y="405" class="row" fill="#34d399">✓ seconds to start</text>
  <text x="460" y="420" class="row" fill="#34d399">✓ good for: jobs · burst · demos</text>
  <rect x="446" y="428" width="218" height="1" fill="#2a3347"/>
  <text x="460" y="444" class="row" fill="#f87171">✗ no slots / swap</text>
  <text x="460" y="459" class="row" fill="#f87171">✗ no auto-scale</text>
  <text x="460" y="474" class="row" fill="#f87171">✗ no managed TLS</text>
  <text x="460" y="489" class="row" fill="#f87171">✗ no VNet integration</text>
  <text x="460" y="504" class="row" fill="#f87171">✗ no custom domain</text>
  <text x="460" y="522" class="row" fill="#64748b">Use App Service for persistent workloads</text>

  <!-- user arrows -->
  <rect x="30" y="584" width="130" height="40" rx="7" fill="#1d2435" stroke="#2a3347" stroke-width="0.75"/>
  <text x="95" y="600" text-anchor="middle" class="sub" fill="#94a3b8">Users</text>
  <text x="95" y="614" text-anchor="middle" class="row" fill="#64748b">HTTPS · port 443</text>
  <line x1="95" y1="584" x2="138" y2="514" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.6"/>

  <rect x="520" y="584" width="130" height="40" rx="7" fill="#1d2435" stroke="#2a3347" stroke-width="0.75"/>
  <text x="585" y="600" text-anchor="middle" class="sub" fill="#94a3b8">Users</text>
  <text x="585" y="614" text-anchor="middle" class="row" fill="#64748b">HTTP · port 80</text>
  <line x1="585" y1="584" x2="570" y2="528" stroke="#f87171" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.6"/>

  <!-- footer -->
  <rect x="0" y="662" width="680" height="18" fill="#161b27"/>
  <rect x="0" y="662" width="680" height="1" fill="#2a3347"/>
  <text x="340" y="676" text-anchor="middle" class="cap sans" font-size="9">ostebovik.net · AZ-104 · Project 8 · App Service &amp; Container Instance · westus3</text>
</svg>

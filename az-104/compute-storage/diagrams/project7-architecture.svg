<svg viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>P7 VM Compute and Extensions — westus3</title>
  <desc>Architecture showing vnet-az104-dev-wus3-01 with snet-web-dev-wus3-01 containing vm-win-dev-wus3-01 in Zone 1 with CSE and BGInfo extensions, and vm-linux-dev-wus3-01 in Zone 2 with data disk and snapshot. Both VMs connect to shared storage account for CSE scripts.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #475569; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 600; }
      .sub  { font-size: 10px; }
      .row  { font-size: 9px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="680" height="760" fill="#0f1117"/>

  <!-- header stripe -->
  <rect x="0" y="0" width="680" height="3" fill="#2dd4bf"/>

  <!-- header -->
  <rect x="0" y="3" width="680" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="680" height="1" fill="#2a3347"/>
  <text x="16" y="26" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Project 7</text>
  <text x="16" y="41" class="sub" fill="#64748b">VM compute · extensions · managed disks · snapshot · westus3</text>
  <rect x="524" y="12" width="140" height="22" rx="11" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="594" y="27" text-anchor="middle" class="sub" fill="#5eead4">project-7 · compute</text>

  <!-- RG outer -->
  <rect x="16" y="56" width="648" height="672" rx="12" fill="#161b27" stroke="#2a3347" stroke-width="1"/>
  <text x="30" y="74" class="sans nm" fill="#94a3b8" font-size="11">rg-az104-dev-wus3-01</text>
  <text x="30" y="87" class="row" fill="#475569">resource group · westus3</text>

  <!-- VNet -->
  <rect x="30" y="96" width="620" height="548" rx="10" fill="#161b27" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="30" y="96" width="620" height="28" rx="10" fill="#1e3a5f"/>
  <rect x="30" y="112" width="620" height="12" fill="#1e3a5f"/>
  <text x="44" y="114" class="sans nm" fill="#93c5fd" font-size="12">vnet-az104-dev-wus3-01</text>
  <text x="44" y="127" class="row" fill="#64748b">10.0.0.0/16 · westus3</text>

  <!-- Subnet -->
  <rect x="44" y="136" width="592" height="494" rx="8" fill="rgba(45,212,191,0.03)" stroke="#2dd4bf" stroke-width="1"/>
  <text x="58" y="154" class="sub" fill="#2dd4bf" font-weight="600">snet-web-dev-wus3-01</text>
  <text x="58" y="167" class="row" fill="#64748b">10.0.3.0/24</text>

  <!-- Zone 1 -->
  <rect x="58" y="176" width="278" height="428" rx="8" fill="rgba(167,139,250,0.04)" stroke="#a78bfa" stroke-width="1"/>
  <text x="197" y="196" text-anchor="middle" class="sub" fill="#a78bfa" font-weight="600">Availability Zone 1</text>

  <!-- Zone 2 -->
  <rect x="344" y="176" width="278" height="428" rx="8" fill="rgba(167,139,250,0.04)" stroke="#a78bfa" stroke-width="1"/>
  <text x="483" y="196" text-anchor="middle" class="sub" fill="#a78bfa" font-weight="600">Availability Zone 2</text>

  <!-- vm-win card -->
  <rect x="72" y="206" width="250" height="56" rx="7" fill="#1d2435" stroke="#94a3b8" stroke-width="0.75"/>
  <rect x="72" y="206" width="250" height="3" rx="2" fill="#94a3b8"/>
  <text x="197" y="225" text-anchor="middle" class="sans nm" fill="#e2e8f0" font-size="11">vm-win-dev-wus3-01</text>
  <text x="197" y="240" text-anchor="middle" class="row" fill="#64748b">Windows Server 2025 Azure Edition · B2s</text>
  <text x="197" y="253" text-anchor="middle" class="row" fill="#64748b">10.0.3.4 · no public IP · hotpatch enabled</text>

  <!-- vm-win → CSE arrow -->
  <line x1="197" y1="262" x2="197" y2="280" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- CSE card -->
  <rect x="72" y="280" width="250" height="48" rx="7" fill="#1c1209" stroke="#f59e0b" stroke-width="0.75"/>
  <rect x="72" y="280" width="250" height="3" rx="2" fill="#f59e0b"/>
  <text x="197" y="299" text-anchor="middle" class="sans nm" fill="#fcd34d" font-size="11">CustomScriptExtension</text>
  <text x="197" y="313" text-anchor="middle" class="row" fill="#92400e">Installs IIS · deploys test page</text>
  <text x="197" y="323" text-anchor="middle" class="row" fill="#64748b">script fetched from stscriptswus301</text>

  <!-- CSE → BGInfo arrow -->
  <line x1="197" y1="328" x2="197" y2="346" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- BGInfo card -->
  <rect x="72" y="346" width="250" height="48" rx="7" fill="#1c1209" stroke="#f59e0b" stroke-width="0.75"/>
  <rect x="72" y="346" width="250" height="3" rx="2" fill="#f59e0b"/>
  <text x="197" y="365" text-anchor="middle" class="sans nm" fill="#fcd34d" font-size="11">BGInfo extension</text>
  <text x="197" y="379" text-anchor="middle" class="row" fill="#92400e">VM info rendered on desktop wallpaper</text>
  <text x="197" y="389" text-anchor="middle" class="row" fill="#64748b">CLI deploy only — not in portal marketplace</text>

  <!-- BGInfo → OS disk arrow -->
  <line x1="197" y1="394" x2="197" y2="412" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- OS disk win -->
  <rect x="72" y="412" width="250" height="44" rx="7" fill="#1d2435" stroke="#64748b" stroke-width="0.75"/>
  <text x="197" y="431" text-anchor="middle" class="sans nm" fill="#94a3b8" font-size="11">disk-os-win-dev-wus3-01</text>
  <text x="197" y="446" text-anchor="middle" class="row" fill="#64748b">OS disk · Premium SSD LRS · deleteOption=Delete</text>

  <!-- NSG win -->
  <rect x="72" y="468" width="250" height="44" rx="7" fill="#161b27" stroke="#2a3347" stroke-width="0.75"/>
  <text x="197" y="487" text-anchor="middle" class="sans nm" fill="#94a3b8" font-size="11">nsg-win-dev-wus3-01</text>
  <text x="197" y="502" text-anchor="middle" class="row" fill="#64748b">allow RDP 3389 · HTTP 80 · AzureLoadBalancer</text>

  <!-- vm-linux card -->
  <rect x="358" y="206" width="250" height="56" rx="7" fill="#1d2435" stroke="#94a3b8" stroke-width="0.75"/>
  <rect x="358" y="206" width="250" height="3" rx="2" fill="#94a3b8"/>
  <text x="483" y="225" text-anchor="middle" class="sans nm" fill="#e2e8f0" font-size="11">vm-linux-dev-wus3-01</text>
  <text x="483" y="240" text-anchor="middle" class="row" fill="#64748b">Ubuntu 24.04 LTS · B2s · SSH key auth</text>
  <text x="483" y="253" text-anchor="middle" class="row" fill="#64748b">10.0.2.4 · no public IP</text>

  <!-- vm-linux → OS disk arrow -->
  <line x1="483" y1="262" x2="483" y2="280" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- OS disk linux -->
  <rect x="358" y="280" width="250" height="44" rx="7" fill="#1d2435" stroke="#64748b" stroke-width="0.75"/>
  <text x="483" y="299" text-anchor="middle" class="sans nm" fill="#94a3b8" font-size="11">disk-os-linux-dev-wus3-01</text>
  <text x="483" y="314" text-anchor="middle" class="row" fill="#64748b">OS disk · Premium SSD LRS · deleteOption=Delete</text>

  <!-- OS disk → data disk arrow -->
  <line x1="483" y1="324" x2="483" y2="342" stroke="#34d399" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Data disk -->
  <rect x="358" y="342" width="250" height="48" rx="7" fill="#0d2e1a" stroke="#34d399" stroke-width="0.75"/>
  <rect x="358" y="342" width="250" height="3" rx="2" fill="#34d399"/>
  <text x="483" y="361" text-anchor="middle" class="sans nm" fill="#34d399" font-size="11">disk-data-az104-dev-wus3-01</text>
  <text x="483" y="375" text-anchor="middle" class="row" fill="#64748b">64 GB · managed · mounted at /data</text>
  <text x="483" y="387" text-anchor="middle" class="row" fill="#64748b">UUID mount · nofail · ext4</text>

  <!-- data disk → snapshot arrow -->
  <line x1="483" y1="390" x2="483" y2="408" stroke="#f87171" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Snapshot -->
  <rect x="358" y="408" width="250" height="48" rx="7" fill="#1c0909" stroke="#f87171" stroke-width="0.75"/>
  <rect x="358" y="408" width="250" height="3" rx="2" fill="#f87171"/>
  <text x="483" y="427" text-anchor="middle" class="sans nm" fill="#fca5a5" font-size="11">snap-linux-dev-wus3-01</text>
  <text x="483" y="441" text-anchor="middle" class="row" fill="#64748b">OS disk snapshot · Standard LRS</text>
  <text x="483" y="453" text-anchor="middle" class="row" fill="#64748b">point-in-time recovery · incremental</text>

  <!-- NSG linux -->
  <rect x="358" y="468" width="250" height="44" rx="7" fill="#161b27" stroke="#2a3347" stroke-width="0.75"/>
  <text x="483" y="487" text-anchor="middle" class="sans nm" fill="#94a3b8" font-size="11">nsg-linux-dev-wus3-01</text>
  <text x="483" y="502" text-anchor="middle" class="row" fill="#64748b">allow SSH 22 from AzureBastionSubnet</text>

  <!-- Shared storage account -->
  <rect x="58" y="522" width="564" height="48" rx="7" fill="#0d2e2a" stroke="#2dd4bf" stroke-width="1"/>
  <rect x="58" y="522" width="564" height="3" rx="2" fill="#2dd4bf"/>
  <text x="340" y="541" text-anchor="middle" class="sans nm" fill="#2dd4bf" font-size="11">stscriptswus301 — scripts container · private · CSE source</text>
  <text x="340" y="555" text-anchor="middle" class="row" fill="#64748b">Standard LRS · blob · service SAS for CSE download · production: managed identity + Storage Blob Data Reader</text>

  <!-- zone arrows to storage -->
  <line x1="197" y1="512" x2="197" y2="522" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.5"/>
  <line x1="483" y1="512" x2="483" y2="522" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.5"/>

  <!-- legend -->
  <rect x="16" y="656" width="648" height="46" rx="6" fill="#161b27" stroke="#2a3347" stroke-width="0.5"/>
  <rect x="28" y="664" width="7" height="7" rx="2" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1"/>
  <text x="40" y="673" class="row" fill="#64748b">VNet</text>
  <rect x="80" y="664" width="7" height="7" rx="2" fill="rgba(167,139,250,0.04)" stroke="#a78bfa" stroke-width="1"/>
  <text x="92" y="673" class="row" fill="#64748b">Availability zone</text>
  <rect x="188" y="664" width="7" height="7" rx="2" fill="#1c1209" stroke="#f59e0b" stroke-width="1"/>
  <text x="200" y="673" class="row" fill="#64748b">VM extension</text>
  <rect x="278" y="664" width="7" height="7" rx="2" fill="#0d2e1a" stroke="#34d399" stroke-width="1"/>
  <text x="290" y="673" class="row" fill="#64748b">Data disk</text>
  <rect x="350" y="664" width="7" height="7" rx="2" fill="#1c0909" stroke="#f87171" stroke-width="1"/>
  <text x="362" y="673" class="row" fill="#64748b">Snapshot</text>
  <rect x="420" y="664" width="7" height="7" rx="2" fill="#0d2e2a" stroke="#2dd4bf" stroke-width="1"/>
  <text x="432" y="673" class="row" fill="#64748b">Storage account</text>
  <rect x="524" y="664" width="7" height="7" rx="2" fill="#161b27" stroke="#2a3347" stroke-width="1"/>
  <text x="536" y="673" class="row" fill="#64748b">NSG</text>

  <text x="28" y="692" class="row" fill="#475569">Disk resize is two steps: az disk update --size-gb (Azure) then resize2fs (OS) · online resize supported for ext4</text>
  <text x="28" y="704" class="row" fill="#475569">Always use UUID in fstab with nofail · device names (/dev/sd*) shift on reboot · never mount data disk at /mnt</text>

  <!-- footer -->
  <rect x="0" y="742" width="680" height="18" fill="#161b27"/>
  <rect x="0" y="742" width="680" height="1" fill="#2a3347"/>
  <text x="340" y="756" text-anchor="middle" class="cap sans" font-size="9">ostebovik.net · AZ-104 · Project 7 · VM Compute &amp; Extensions · westus3</text>
</svg>

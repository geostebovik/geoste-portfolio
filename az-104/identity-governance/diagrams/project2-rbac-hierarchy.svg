<svg width="100%" viewBox="0 0 860 660" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Azure RBAC: Group to Role to Scope hierarchy</title>
  <desc>Architecture diagram showing three security groups (Developers, Ops, Read-only) mapped to Azure built-in and custom roles, then assigned to two scope levels: resource group and subscription.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
      .nm   { font-size: 12px; font-weight: 500; }
      .sub  { font-size: 10px; }
      .row  { font-size: 10px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="860" height="660" fill="#0f1117"/>

  <!-- header stripe -->
  <rect x="0" y="0" width="860" height="3" fill="#a78bfa"/>

  <!-- header -->
  <rect x="0" y="3" width="860" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="860" height="1" fill="#2a3347"/>
  <text x="20" y="28" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Phase 1 · Project 2</text>
  <text x="20" y="42" class="sub" fill="#64748b">RBAC — Group → Role → Scope hierarchy</text>
  <rect x="666" y="12" width="174" height="22" rx="11" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="753" y="27" text-anchor="middle" class="sub" fill="#c4b5fd">phase-1 · project-2</text>

  <!-- ── TIER LABELS ── -->
  <text x="20" y="90" class="cap sans" fill="#64748b">Groups</text>
  <line x1="20" y1="96" x2="840" y2="96" stroke="#2a3347" stroke-width="0.5"/>

  <text x="20" y="218" class="cap sans" fill="#64748b">Roles</text>
  <line x1="20" y1="224" x2="840" y2="224" stroke="#2a3347" stroke-width="0.5"/>

  <text x="20" y="420" class="cap sans" fill="#64748b">Scope</text>
  <line x1="20" y1="426" x2="840" y2="426" stroke="#2a3347" stroke-width="0.5"/>

  <!-- ── TIER 1: GROUPS ── -->
  <!-- grp-developers: left -->
  <rect x="80" y="108" width="180" height="56" rx="8" fill="#1d2435" stroke="#3b82f6" stroke-width="0.5"/>
  <rect x="80" y="108" width="180" height="3" rx="2" fill="#3b82f6"/>
  <text x="170" y="130" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="12">grp-developers</text>
  <text x="170" y="148" text-anchor="middle" class="sub" fill="#64748b">dev1, dev2</text>

  <!-- grp-ops: center -->
  <rect x="340" y="108" width="180" height="56" rx="8" fill="#1d2435" stroke="#3b82f6" stroke-width="0.5"/>
  <rect x="340" y="108" width="180" height="3" rx="2" fill="#3b82f6"/>
  <text x="430" y="130" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="12">grp-ops</text>
  <text x="430" y="148" text-anchor="middle" class="sub" fill="#64748b">ops1</text>

  <!-- grp-readonly: right -->
  <rect x="600" y="108" width="180" height="56" rx="8" fill="#1d2435" stroke="#3b82f6" stroke-width="0.5"/>
  <rect x="600" y="108" width="180" height="3" rx="2" fill="#3b82f6"/>
  <text x="690" y="130" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="12">grp-readonly</text>
  <text x="690" y="148" text-anchor="middle" class="sub" fill="#64748b">readonly1</text>

  <!-- ── TIER 2: ROLES ──
       Top row center: VM Contributor (left-center), Storage Blob Reader Plus (right-center)
       Bottom row wide: Contributor (far left), Reader (far right)
  -->

  <!-- VM Contributor — top row left-center y=236 -->
  <rect x="260" y="236" width="160" height="60" rx="8" fill="#1d2435" stroke="#a78bfa" stroke-width="0.5"/>
  <rect x="260" y="236" width="160" height="3" rx="2" fill="#a78bfa"/>
  <text x="340" y="258" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="12">VM Contributor</text>
  <text x="340" y="276" text-anchor="middle" class="sub" fill="#64748b">Built-in · VMs only</text>

  <!-- Storage Blob Reader Plus — top row right-center y=236 -->
  <rect x="440" y="236" width="160" height="60" rx="8" fill="#1d2435" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="440" y="236" width="160" height="3" rx="2" fill="#a78bfa"/>
  <text x="520" y="256" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="11">Storage Blob</text>
  <text x="520" y="271" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="11">Reader Plus</text>
  <text x="520" y="286" text-anchor="middle" class="sub" fill="#64748b">Custom role · dev1</text>
  <!-- Custom badge -->
  <rect x="440" y="228" width="46" height="14" rx="7" fill="#a78bfa"/>
  <text x="463" y="239" text-anchor="middle" fill="#1e1b4b" font-size="9" font-weight="600" font-family="'IBM Plex Mono',monospace">custom</text>

  <!-- Contributor — bottom row far left y=330 -->
  <rect x="60" y="330" width="180" height="60" rx="8" fill="#1d2435" stroke="#a78bfa" stroke-width="0.5"/>
  <rect x="60" y="330" width="180" height="3" rx="2" fill="#a78bfa"/>
  <text x="150" y="352" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="12">Contributor</text>
  <text x="150" y="370" text-anchor="middle" class="sub" fill="#64748b">Built-in · full CRUD</text>

  <!-- Reader — bottom row far right y=330 -->
  <rect x="620" y="330" width="180" height="60" rx="8" fill="#1d2435" stroke="#a78bfa" stroke-width="0.5"/>
  <rect x="620" y="330" width="180" height="3" rx="2" fill="#a78bfa"/>
  <text x="710" y="352" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="12">Reader</text>
  <text x="710" y="370" text-anchor="middle" class="sub" fill="#64748b">Built-in · read only</text>

  <!-- ── ARROWS: Groups → Roles ──
       grp-developers → Contributor (left), VM Contributor (center-left)
       grp-ops → VM Contributor, Storage Blob Reader Plus
       grp-readonly → Reader (right)
  -->
  <line x1="170" y1="164" x2="150" y2="330" stroke="#3b82f6" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="164" x2="320" y2="236" stroke="#3b82f6" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="164" x2="340" y2="236" stroke="#3b82f6" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="164" x2="500" y2="236" stroke="#3b82f6" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="164" x2="710" y2="330" stroke="#3b82f6" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── ARROWS: Roles → Scope ── -->
  <line x1="150" y1="390" x2="260" y2="438" stroke="#a78bfa" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="296" x2="370" y2="438" stroke="#a78bfa" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="296" x2="430" y2="438" stroke="#a78bfa" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="390" x2="600" y2="438" stroke="#a78bfa" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── TIER 3: SCOPE ── -->

  <!-- Subscription scope -->
  <rect x="60" y="438" width="740" height="68" rx="10" fill="#1d2435" stroke="#34d399" stroke-width="0.5" stroke-dasharray="6 3"/>
  <rect x="60" y="438" width="740" height="3" rx="2" fill="#34d399"/>
  <text x="430" y="460" text-anchor="middle" class="sans nm" fill="#86efac" font-size="12">Subscription scope</text>
  <text x="430" y="478" text-anchor="middle" class="sub" fill="#64748b">Reader assigned here — all resource groups visible</text>
  <text x="430" y="496" text-anchor="middle" class="sub" fill="#64748b">Sub ID: /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx</text>

  <!-- Resource Group scope -->
  <rect x="140" y="520" width="580" height="50" rx="8" fill="#1d2435" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="140" y="520" width="580" height="3" rx="2" fill="#2dd4bf"/>
  <text x="430" y="542" text-anchor="middle" class="sans nm" fill="#5eead4" font-size="12">rg-phase1-lab</text>
  <text x="430" y="560" text-anchor="middle" class="sub" fill="#64748b">Contributor · VM Contributor · Storage Blob Reader Plus assigned here</text>

  <!-- ── LEGEND ── -->
  <rect x="80" y="590" width="8" height="8" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="94" y="598" class="sub" fill="#64748b">Security group</text>
  <rect x="220" y="590" width="8" height="8" rx="2" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="234" y="598" class="sub" fill="#64748b">Role</text>
  <rect x="300" y="590" width="8" height="8" rx="2" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="314" y="598" class="sub" fill="#64748b">Custom role</text>
  <rect x="430" y="590" width="8" height="8" rx="2" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="444" y="598" class="sub" fill="#64748b">Subscription scope</text>
  <rect x="600" y="590" width="8" height="8" rx="2" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="614" y="598" class="sub" fill="#64748b">Resource group</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="622" width="860" height="38" fill="#161b27"/>
  <rect x="0" y="622" width="860" height="1" fill="#2a3347"/>
  <text x="430" y="645" text-anchor="middle" class="cap sans" fill="#475569" font-size="10">ostebovik.net · AZ-104 Phase 1 · Project 2 · RBAC Hierarchy · identity-governance</text>
</svg>

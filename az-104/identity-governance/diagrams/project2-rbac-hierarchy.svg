<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Azure RBAC: Group to Role to Scope hierarchy</title>
  <desc>Architecture diagram showing three security groups (Developers, Ops, Read-only) mapped to Azure built-in and custom roles, then assigned to two scope levels: resource group and subscription.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .th { font-size: 13px; font-weight: 500; fill: #0C447C; }
      .ts { font-size: 11px; font-weight: 400; fill: #185FA5; }
      .th-p { font-size: 13px; font-weight: 500; fill: #3C3489; }
      .ts-p { font-size: 11px; font-weight: 400; fill: #534AB7; }
      .th-t { font-size: 13px; font-weight: 500; fill: #085041; }
      .ts-t { font-size: 11px; font-weight: 400; fill: #0F6E56; }
      .th-g { font-size: 13px; font-weight: 500; fill: #27500A; }
      .ts-g { font-size: 11px; font-weight: 400; fill: #3B6D11; }
      .label { font-size: 11px; font-weight: 500; fill: #5F5E5A; letter-spacing: 0.05em; }
      .tier-title { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    </style>
  </defs>

  <!-- Background: white for export -->
  <rect width="680" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:15px;font-weight:500;fill:#2C2C2A;">Azure RBAC: Group → Role → Scope hierarchy</text>

  <!-- Tier labels -->
  <text x="60" y="72" class="label">GROUPS</text>
  <text x="60" y="232" class="label">ROLES</text>
  <text x="60" y="412" class="label">SCOPE</text>

  <!-- Divider lines -->
  <line x1="40" y1="82" x2="640" y2="82" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="40" y1="242" x2="640" y2="242" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="40" y1="422" x2="640" y2="422" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- ── TIER 1: GROUPS ── -->

  <!-- grp-developers -->
  <rect x="68" y="95" width="158" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="147" y="119" text-anchor="middle" class="th">grp-developers</text>
  <text x="147" y="138" text-anchor="middle" class="ts">dev1, dev2</text>

  <!-- grp-ops -->
  <rect x="261" y="95" width="158" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="119" text-anchor="middle" class="th">grp-ops</text>
  <text x="340" y="138" text-anchor="middle" class="ts">ops1</text>

  <!-- grp-readonly -->
  <rect x="454" y="95" width="158" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="533" y="119" text-anchor="middle" class="th">grp-readonly</text>
  <text x="533" y="138" text-anchor="middle" class="ts">readonly1</text>

  <!-- ── ARROWS: Groups → Roles ── -->
  <line x1="147" y1="151" x2="147" y2="255" stroke="#378ADD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="151" x2="292" y2="255" stroke="#378ADD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="151" x2="437" y2="255" stroke="#378ADD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="533" y1="151" x2="533" y2="255" stroke="#378ADD" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── TIER 2: ROLES ── -->

  <!-- Contributor -->
  <rect x="68" y="255" width="158" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="147" y="279" text-anchor="middle" class="th-p">Contributor</text>
  <text x="147" y="298" text-anchor="middle" class="ts-p">Built-in · full CRUD</text>

  <!-- VM Contributor -->
  <rect x="213" y="255" width="160" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="293" y="279" text-anchor="middle" class="th-p">VM Contributor</text>
  <text x="293" y="298" text-anchor="middle" class="ts-p">Built-in · VMs only</text>

  <!-- Storage Blob Reader+ (custom) -->
  <rect x="358" y="255" width="160" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="438" y="274" text-anchor="middle" class="th-p">Storage Blob</text>
  <text x="438" y="290" text-anchor="middle" class="th-p">Reader Plus</text>
  <text x="438" y="306" text-anchor="middle" class="ts-p">Custom role · dev1</text>

  <!-- Reader -->
  <rect x="454" y="255" width="158" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="533" y="279" text-anchor="middle" class="th-p">Reader</text>
  <text x="533" y="298" text-anchor="middle" class="ts-p">Built-in · read only</text>

  <!-- Custom role badge -->
  <rect x="358" y="248" width="44" height="14" rx="7" fill="#534AB7"/>
  <text x="380" y="259" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:9px;font-weight:500;fill:#EEEDFE;">custom</text>

  <!-- ── ARROWS: Roles → Scope ── -->
  <line x1="147" y1="315" x2="192" y2="432" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="293" y1="315" x2="244" y2="432" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="438" y1="315" x2="340" y2="432" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="533" y1="315" x2="490" y2="432" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── TIER 3: SCOPE ── -->

  <!-- Subscription scope container -->
  <rect x="68" y="432" width="544" height="70" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text x="340" y="456" text-anchor="middle" class="th-g">Subscription scope</text>
  <text x="340" y="475" text-anchor="middle" class="ts-g">Reader assigned here — all resource groups visible</text>
  <text x="340" y="491" text-anchor="middle" class="ts-g">Sub ID: /subscriptions/&lt;your-id&gt;</text>

  <!-- Resource Group scope container -->
  <rect x="110" y="520" width="460" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="539" text-anchor="middle" class="th-t">rg-phase1-lab</text>
  <text x="340" y="556" text-anchor="middle" class="ts-t">Contributor + VM Contributor + Storage Blob Reader Plus assigned here</text>

  <!-- Legend -->
  <rect x="68" y="572" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="84" y="581" class="label">Security group</text>
  <rect x="190" y="572" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="206" y="581" class="label">Role</text>
  <rect x="260" y="572" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="276" y="581" class="label">Custom role</text>
  <rect x="372" y="572" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="388" y="581" class="label">Subscription scope</text>
  <rect x="510" y="572" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="526" y="581" class="label">Resource group</text>
</svg>

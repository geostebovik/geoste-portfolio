  <rect x="218" y="607" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="234" y="616" style="font-size:10px;fill:#3d3d38;">Private endpoint / DNS</text>
  <rect x="360" y="607" width="10" height="10" rx="2" fill="#fff7ed" stroke="#b35c00" stroke-width="1"/>
  <text x="376" y="616" style="font-size:10px;fill:#3d3d38;">Storage account</text>
  <rect x="470" y="607" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="486" y="616" style="font-size:10px;fill:#3d3d38;">Public DNS zone</text>
  <rect x="580" y="607" width="10" height="10" rx="2" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="596" y="616" style="font-size:10px;fill:#3d3d38;">Blocked public access (404)</text>
  <rect x="742" y="607" width="10" height="10" rx="2" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="758" y="616" style="font-size:10px;fill:#3d3d38;">Private path (allowed)</text>
</svg>

<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>Azure DNS and Private Endpoint Architecture — Project 6</title>
  <desc>Architecture diagram showing public DNS zone lab.ostebovik.net with A and CNAME records, private DNS zone privatelink.blob.core.windows.net linked to vnet-hub and vnet-spoke, private endpoint pe-storage-blob in snet-shared connecting to stlabeastus001 storage account, and public internet access blocked with 404 WebContentNotFound response.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #64748b; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 500; }
      .sub  { font-size: 10px; }
      .row  { font-size: 9px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="900" height="660" fill="#0f1117"/>

  <!-- header stripe -->
  <rect x="0" y="0" width="900" height="3" fill="#34d399"/>

  <!-- header -->
  <rect x="0" y="3" width="900" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="900" height="1" fill="#2a3347"/>
  <text x="20" y="28" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Phase 2 · Project 6</text>
  <text x="20" y="42" class="sub" fill="#64748b">Public DNS zone · Private DNS zone · Private endpoint · Public access lockdown</text>
  <rect x="690" y="12" width="190" height="22" rx="11" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="785" y="27" text-anchor="middle" class="sub" fill="#86efac">phase-2 · project-6</text>

  <!-- ── PUBLIC DNS ZONE (top left) ── -->
  <rect x="30" y="62" width="248" height="152" rx="10" fill="#1d2435" stroke="#34d399" stroke-width="1"/>
  <rect x="30" y="62" width="248" height="28" rx="10" fill="#14532d"/>
  <rect x="30" y="78" width="248" height="12" fill="#14532d"/>
  <text x="50" y="80" fill="#86efac" font-size="11" font-weight="600" font-family="'Syne',sans-serif">Public DNS zone</text>
  <text x="50" y="92" class="row" fill="#5eead4">lab.ostebovik.net</text>
  <rect x="44" y="104" width="220" height="26" rx="4" fill="#242c40" stroke="#34d399" stroke-width="0.5"/>
  <text x="52" y="116" class="sub" fill="#86efac">A record:</text>
  <text x="52" y="126" class="row" fill="#64748b">www → 20.171.241.228 (pip-lb-web)</text>
  <rect x="44" y="136" width="220" height="26" rx="4" fill="#242c40" stroke="#34d399" stroke-width="0.5"/>
  <text x="52" y="148" class="sub" fill="#86efac">CNAME record:</text>
  <text x="52" y="158" class="row" fill="#64748b">storage → stlabeastus001.blob...</text>
  <rect x="44" y="168" width="220" height="36" rx="4" fill="#1d2435" stroke="#2a3347" stroke-width="0.5"/>
  <text x="154" y="182" text-anchor="middle" class="row" fill="#64748b">NS records (Azure-assigned):</text>
  <text x="154" y="196" text-anchor="middle" class="row" fill="#64748b">ns1-xx.azure-dns.com</text>

  <!-- ── INTERNET BLOCKED (top right) ── -->
  <g transform="translate(620,58)">
    <ellipse cx="62" cy="24" rx="56" ry="18" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="34" cy="28" rx="28" ry="13" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="88" cy="28" rx="24" ry="12" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <rect x="10" y="26" width="104" height="12" fill="#1d2435"/>
    <text x="62" y="34" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="'Syne',sans-serif">Internet</text>
  </g>
  <line x1="682" y1="104" x2="734" y2="148" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <rect x="612" y="114" width="134" height="22" rx="11" fill="#450a0a" stroke="#f87171" stroke-width="0.75"/>
  <text x="679" y="129" text-anchor="middle" class="sub" fill="#fca5a5">✗ Public access disabled</text>
  <rect x="612" y="148" width="262" height="66" rx="8" fill="#1d2435" stroke="#f87171" stroke-width="1"/>
  <rect x="612" y="148" width="262" height="3" rx="2" fill="#f87171"/>
  <text x="743" y="168" text-anchor="middle" class="sans nm" fill="#f87171" font-size="11" font-weight="600">404 WebContentNotFound</text>
  <text x="743" y="184" text-anchor="middle" class="row" fill="#64748b">stlabeastus001.blob.core.windows.net</text>
  <text x="743" y="198" text-anchor="middle" class="row" fill="#64748b">Resource not visible from public internet</text>

  <!-- ── PRIVATE DNS ZONE (centre top) ── -->
  <rect x="294" y="62" width="310" height="104" rx="10" fill="#1d2435" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="294" y="62" width="310" height="28" rx="10" fill="#2e1065"/>
  <rect x="294" y="78" width="310" height="12" fill="#2e1065"/>
  <text x="314" y="80" fill="#d8b4fe" font-size="11" font-weight="600" font-family="'Syne',sans-serif">Private DNS zone</text>
  <text x="314" y="92" class="row" fill="#c4b5fd">privatelink.blob.core.windows.net</text>
  <rect x="308" y="104" width="282" height="26" rx="5" fill="#242c40" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="316" y="115" class="sub" fill="#d8b4fe">Auto-created A record:</text>
  <text x="316" y="126" class="row" fill="#64748b">stlabeastus001 → 10.0.1.6 (PE NIC)</text>
  <rect x="308" y="136" width="134" height="22" rx="5" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="375" y="151" text-anchor="middle" class="row" fill="#d8b4fe">dns-link-hub (auto-reg)</text>
  <rect x="450" y="136" width="134" height="22" rx="5" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="517" y="151" text-anchor="middle" class="row" fill="#d8b4fe">dns-link-spoke (resolve)</text>

  <!-- ── VNET-HUB ── -->
  <rect x="30" y="248" width="388" height="288" rx="12" fill="#161b27" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="30" y="248" width="388" height="28" rx="12" fill="#1e3a5f"/>
  <rect x="30" y="264" width="388" height="12" fill="#1e3a5f"/>
  <text x="50" y="266" fill="#93c5fd" font-size="12" font-weight="600" font-family="'Syne',sans-serif">vnet-hub  ·  10.0.0.0/16</text>
  <text x="402" y="266" text-anchor="end" fill="#4a9eff" font-size="9" font-weight="600" letter-spacing=".06em">HUB</text>

  <!-- snet-shared -->
  <rect x="46" y="290" width="356" height="232" rx="8" fill="rgba(74,158,255,0.04)" stroke="#4a9eff" stroke-width="1"/>
  <text x="60" y="308" class="sub" fill="#93c5fd">snet-shared  ·  10.0.1.0/24</text>

  <!-- Private endpoint -->
  <rect x="60" y="318" width="324" height="84" rx="8" fill="#1d2435" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="60" y="318" width="324" height="3" rx="2" fill="#a78bfa"/>
  <text x="222" y="338" text-anchor="middle" class="sans nm" fill="#d8b4fe" font-size="11" font-weight="600">pe-storage-blob</text>
  <text x="222" y="353" text-anchor="middle" class="sub" fill="#64748b">Private endpoint · Microsoft.Storage/blob</text>
  <rect x="74" y="362" width="148" height="30" rx="5" fill="#242c40" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="148" y="374" text-anchor="middle" class="sub" fill="#d8b4fe">NIC: 10.0.1.6</text>
  <text x="148" y="386" text-anchor="middle" class="row" fill="#64748b">Private IP in hub subnet</text>
  <rect x="232" y="362" width="138" height="30" rx="5" fill="#242c40" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="301" y="374" text-anchor="middle" class="sub" fill="#d8b4fe">Connection approved</text>
  <text x="301" y="386" text-anchor="middle" class="row" fill="#64748b">pe-conn-blob</text>

  <!-- vm-hub-test -->
  <rect x="60" y="412" width="324" height="100" rx="8" fill="#1d2435" stroke="#4a9eff" stroke-width="0.75"/>
  <rect x="60" y="412" width="324" height="3" rx="2" fill="#4a9eff"/>
  <text x="222" y="432" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="11" font-weight="600">vm-hub-test</text>
  <text x="222" y="447" text-anchor="middle" class="sub" fill="#64748b">Ubuntu 22.04 · B1s · 10.0.1.4</text>
  <rect x="74" y="456" width="296" height="46" rx="5" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="222" y="470" text-anchor="middle" class="sub" fill="#86efac">nslookup result (from vm-web-01 via peering):</text>
  <text x="222" y="484" text-anchor="middle" class="row" fill="#86efac">stlabeastus001.blob... → 10.0.1.6 ✓</text>
  <text x="222" y="496" text-anchor="middle" class="row" fill="#5eead4">Private IP resolved — traffic stays in VNet</text>

  <!-- ── VNET-SPOKE ── -->
  <rect x="434" y="248" width="440" height="176" rx="12" fill="#161b27" stroke="#2dd4bf" stroke-width="1.5"/>
  <rect x="434" y="248" width="440" height="28" rx="12" fill="#134e4a"/>
  <rect x="434" y="264" width="440" height="12" fill="#134e4a"/>
  <text x="454" y="266" fill="#5eead4" font-size="12" font-weight="600" font-family="'Syne',sans-serif">vnet-spoke  ·  10.1.0.0/16</text>
  <text x="858" y="266" text-anchor="end" fill="#2dd4bf" font-size="9" font-weight="600" letter-spacing=".06em">SPOKE</text>

  <!-- snet-web -->
  <rect x="450" y="290" width="408" height="124" rx="8" fill="rgba(45,212,191,0.04)" stroke="#2dd4bf" stroke-width="1"/>
  <text x="464" y="308" class="sub" fill="#5eead4">snet-web  ·  10.1.1.0/24</text>

  <!-- vm-web-01 -->
  <rect x="464" y="316" width="184" height="84" rx="7" fill="#1d2435" stroke="#2dd4bf" stroke-width="0.75"/>
  <rect x="464" y="316" width="184" height="3" rx="2" fill="#2dd4bf"/>
  <text x="556" y="335" text-anchor="middle" class="sans nm" fill="#5eead4" font-size="11" font-weight="600">vm-web-01</text>
  <text x="556" y="349" text-anchor="middle" class="sub" fill="#64748b">10.1.1.4 · No public IP</text>
  <rect x="476" y="358" width="160" height="32" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="556" y="370" text-anchor="middle" class="row" fill="#86efac">nslookup runs from here</text>
  <text x="556" y="382" text-anchor="middle" class="row" fill="#64748b">via Bastion connection</text>

  <!-- vm-web-02 -->
  <rect x="662" y="316" width="184" height="84" rx="7" fill="#1d2435" stroke="#2dd4bf" stroke-width="0.75"/>
  <rect x="662" y="316" width="184" height="3" rx="2" fill="#2dd4bf"/>
  <text x="754" y="335" text-anchor="middle" class="sans nm" fill="#5eead4" font-size="11" font-weight="600">vm-web-02</text>
  <text x="754" y="349" text-anchor="middle" class="sub" fill="#64748b">10.1.1.5 · No public IP</text>
  <rect x="674" y="358" width="160" height="32" rx="4" fill="#242c40" stroke="#364259" stroke-width="0.5"/>
  <text x="754" y="370" text-anchor="middle" class="row" fill="#94a3b8">LB backend pool</text>
  <text x="754" y="382" text-anchor="middle" class="row" fill="#64748b">vm-web backend</text>

  <!-- ── STORAGE ACCOUNT ── -->
  <rect x="434" y="442" width="440" height="96" rx="10" fill="#1d2435" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="434" y="442" width="440" height="3" rx="2" fill="#f59e0b"/>
  <text x="454" y="462" class="sans nm" fill="#fcd34d" font-size="12" font-weight="600">stlabeastus001</text>
  <text x="454" y="477" class="sub" fill="#64748b">Standard_LRS · East US · Public access: Disabled</text>
  <rect x="448" y="484" width="196" height="44" rx="6" fill="#1c1209" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="546" y="500" text-anchor="middle" class="sub" fill="#fcd34d">Containers: uploads, archive, $web</text>
  <text x="546" y="516" text-anchor="middle" class="row" fill="#64748b">Static website endpoint active</text>
  <rect x="656" y="484" width="206" height="44" rx="6" fill="#450a0a" stroke="#f87171" stroke-width="0.5"/>
  <text x="759" y="500" text-anchor="middle" class="sub" fill="#fca5a5">Public network access</text>
  <text x="759" y="514" text-anchor="middle" class="sub" fill="#f87171" font-weight="600">DISABLED</text>
  <text x="759" y="526" text-anchor="middle" class="row" fill="#64748b">Private endpoint only</text>

  <!-- ── VNet Peering — moved to blank space above VNet boundaries ── -->
  <rect x="390" y="200" width="60" height="44" rx="22" fill="#1d2435" stroke="#4a9eff" stroke-width="1"/>
  <text x="420" y="218" text-anchor="middle" class="row" fill="#93c5fd">VNet</text>
  <text x="420" y="230" text-anchor="middle" class="row" fill="#93c5fd">Peering</text>
  <text x="420" y="242" text-anchor="middle" class="row" fill="#4a9eff">✓ Sync</text>
  <!-- peering lines to hub and spoke header bars -->
  <line x1="406" y1="222" x2="300" y2="248" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="434" y1="222" x2="540" y2="248" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- nslookup annotation — also in blank space -->
  <rect x="466" y="200" width="140" height="36" rx="6" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="536" y="216" text-anchor="middle" class="row" fill="#86efac">nslookup via peering</text>
  <text x="536" y="229" text-anchor="middle" class="row" fill="#5eead4">→ resolves 10.0.1.6</text>

  <!-- Private endpoint → storage -->
  <line x1="450" y1="360" x2="490" y2="442" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="454" y="390" width="118" height="18" rx="9" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="513" y="403" text-anchor="middle" class="row" fill="#d8b4fe">Private link connection</text>

  <!-- DNS zone → VNet links -->
  <line x1="375" y1="166" x2="222" y2="248" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="517" y1="166" x2="554" y2="248" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- ── LEGEND ── -->
  <rect x="30" y="554" width="840" height="34" rx="6" fill="#161b27" stroke="#2a3347" stroke-width="0.5"/>

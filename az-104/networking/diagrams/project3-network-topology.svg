<svg viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>P3 Hub-Spoke Network Topology — westus3</title>
  <desc>Hub-spoke VNet topology showing vnet-hub-dev-wus3-01 with AzureBastionSubnet and snet-shared, connected via VNet peering to vnet-spoke-dev-wus3-01 with snet-web and snet-db. Internet traffic flows to Bastion and snet-web. Bastion provides SSH/RDP access to VMs via peering.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #475569; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 600; }
      .sub  { font-size: 10px; }
      .row  { font-size: 9px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="680" height="640" fill="#0f1117"/>

  <!-- header stripe -->
  <rect x="0" y="0" width="680" height="3" fill="#4a9eff"/>

  <!-- header -->
  <rect x="0" y="3" width="680" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="680" height="1" fill="#2a3347"/>
  <text x="16" y="26" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Project 3</text>
  <text x="16" y="41" class="sub" fill="#64748b">Hub-spoke topology · VNet peering · Bastion · NSG segmentation · westus3</text>
  <rect x="524" y="12" width="140" height="22" rx="11" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="594" y="27" text-anchor="middle" class="sub" fill="#93c5fd">project-3 · topology</text>

  <!-- Internet cloud -->
  <g transform="translate(278,58)">
    <ellipse cx="62" cy="22" rx="56" ry="18" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="34" cy="26" rx="28" ry="13" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="88" cy="26" rx="24" ry="12" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <rect x="10" y="24" width="104" height="12" fill="#1d2435"/>
    <text x="62" y="32" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="'Syne',sans-serif">Internet</text>
  </g>

  <!-- arrow Internet → Bastion -->
  <line x1="310" y1="100" x2="160" y2="158" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="176" y="108" width="106" height="18" rx="9" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="229" y="121" text-anchor="middle" class="row" fill="#86efac">✓ HTTPS 443 → Bastion</text>

  <!-- arrow Internet → snet-web -->
  <line x1="352" y1="100" x2="506" y2="158" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="366" y="108" width="122" height="18" rx="9" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="427" y="121" text-anchor="middle" class="row" fill="#86efac">✓ HTTP/HTTPS → snet-web</text>

  <!-- ── VNET-HUB ── -->
  <rect x="16" y="150" width="296" height="368" rx="12" fill="#161b27" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="16" y="150" width="296" height="28" rx="12" fill="#1e3a5f"/>
  <rect x="16" y="166" width="296" height="12" fill="#1e3a5f"/>
  <text x="30" y="168" class="sans nm" fill="#93c5fd" font-size="12">vnet-hub-dev-wus3-01</text>
  <text x="30" y="183" class="row" fill="#64748b">10.0.0.0/16 · westus3</text>
  <text x="298" y="168" text-anchor="end" fill="#4a9eff" font-size="9" font-weight="600" letter-spacing=".06em">HUB</text>

  <!-- AzureBastionSubnet -->
  <rect x="30" y="192" width="268" height="108" rx="8" fill="rgba(74,158,255,0.04)" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="44" y="210" class="sub" fill="#93c5fd">AzureBastionSubnet</text>
  <text x="44" y="223" class="row" fill="#64748b">10.0.7.0/26 · /26 minimum required</text>

  <!-- Bastion card -->
  <rect x="44" y="230" width="240" height="58" rx="7" fill="#1d2435" stroke="#4a9eff" stroke-width="0.75"/>
  <rect x="44" y="230" width="240" height="3" rx="2" fill="#4a9eff"/>
  <text x="164" y="248" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="11">Azure Bastion (Standard SKU)</text>
  <text x="164" y="263" text-anchor="middle" class="row" fill="#64748b">Browser RDP/SSH · no public IP on VMs</text>
  <text x="164" y="275" text-anchor="middle" class="row" fill="#64748b">pip-bastion → HTTPS 443 inbound only</text>

  <!-- snet-shared -->
  <rect x="30" y="312" width="268" height="192" rx="8" fill="rgba(74,158,255,0.04)" stroke="#4a9eff" stroke-width="1"/>
  <text x="44" y="330" class="sub" fill="#93c5fd">snet-shared · 10.0.1.0/24</text>

  <!-- vm-win card -->
  <rect x="44" y="340" width="240" height="72" rx="7" fill="#1d2435" stroke="#4a9eff" stroke-width="0.75"/>
  <rect x="44" y="340" width="240" height="3" rx="2" fill="#4a9eff"/>
  <text x="164" y="358" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="11">vm-win-dev-wus3-01</text>
  <text x="164" y="373" text-anchor="middle" class="row" fill="#64748b">Windows Server 2025 · B2s · 10.0.1.4</text>
  <text x="164" y="385" text-anchor="middle" class="row" fill="#64748b">No public IP · access via Bastion only</text>
  <rect x="56" y="394" width="216" height="12" rx="3" fill="#14532d" stroke="#34d399" stroke-width="0.4"/>
  <text x="164" y="404" text-anchor="middle" class="row" fill="#86efac">Prod: DNS forwarders · NVAs · jump hosts</text>

  <!-- No NSG note -->
  <text x="164" y="438" text-anchor="middle" class="row" fill="#475569">No NSG on hub subnets in this lab</text>
  <text x="164" y="452" text-anchor="middle" class="row" fill="#334155">(Bastion manages its own security)</text>

  <!-- Bastion SSH down arrow -->
  <line x1="164" y1="288" x2="164" y2="340" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)" opacity="0.6"/>
  <text x="175" y="316" class="row" fill="#4a9eff">SSH/RDP</text>
  <text x="175" y="328" class="row" fill="#4a9eff">via Bastion</text>

  <!-- ── VNET-SPOKE ── -->
  <rect x="368" y="150" width="296" height="368" rx="12" fill="#161b27" stroke="#2dd4bf" stroke-width="1.5"/>
  <rect x="368" y="150" width="296" height="28" rx="12" fill="#134e4a"/>
  <rect x="368" y="166" width="296" height="12" fill="#134e4a"/>
  <text x="382" y="168" class="sans nm" fill="#5eead4" font-size="12">vnet-spoke-dev-wus3-01</text>
  <text x="382" y="183" class="row" fill="#64748b">10.1.0.0/16 · westus3</text>
  <text x="650" y="168" text-anchor="end" fill="#2dd4bf" font-size="9" font-weight="600" letter-spacing=".06em">SPOKE</text>

  <!-- snet-web with nsg-web badge -->
  <rect x="382" y="192" width="268" height="168" rx="8" fill="rgba(45,212,191,0.04)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="382" y="185" width="56" height="16" rx="8" fill="#92400e"/>
  <text x="410" y="197" text-anchor="middle" class="row" fill="#fcd34d" font-weight="600">nsg-web</text>
  <text x="396" y="210" class="sub" fill="#5eead4">snet-web · 10.1.1.0/24 · Web tier</text>

  <!-- vm-linux card -->
  <rect x="396" y="218" width="240" height="80" rx="7" fill="#1d2435" stroke="#2dd4bf" stroke-width="0.75"/>
  <rect x="396" y="218" width="240" height="3" rx="2" fill="#2dd4bf"/>
  <text x="516" y="236" text-anchor="middle" class="sans nm" fill="#5eead4" font-size="11">vm-linux-dev-wus3-01</text>
  <text x="516" y="251" text-anchor="middle" class="row" fill="#64748b">Ubuntu 24.04 LTS · B2s · 10.1.1.4</text>
  <text x="516" y="263" text-anchor="middle" class="row" fill="#64748b">No public IP · access via Bastion only</text>
  <rect x="408" y="271" width="216" height="20" rx="3" fill="#14532d" stroke="#34d399" stroke-width="0.4"/>
  <text x="516" y="285" text-anchor="middle" class="row" fill="#86efac">Bastion → cross-VNet SSH via peering</text>

  <!-- nsg-web rules ref -->
  <rect x="396" y="304" width="240" height="44" rx="6" fill="#1c1209" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="516" y="320" text-anchor="middle" class="row" fill="#fcd34d" font-weight="600">nsg-web rules summary</text>
  <text x="516" y="334" text-anchor="middle" class="row" fill="#64748b">Allow 80/443 · deny RDP/SSH from Internet</text>
  <text x="516" y="346" text-anchor="middle" class="row" fill="#64748b">Full rule table → Diagram 2</text>

  <!-- snet-db with nsg-db badge -->
  <rect x="382" y="372" width="268" height="132" rx="8" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="382" y="365" width="52" height="16" rx="8" fill="#7f1d1d"/>
  <text x="408" y="377" text-anchor="middle" class="row" fill="#fca5a5" font-weight="600">nsg-db</text>
  <text x="396" y="390" class="sub" fill="#f87171">snet-db · 10.1.2.0/24 · Database tier</text>

  <!-- DB placeholder -->
  <rect x="396" y="398" width="240" height="44" rx="7" fill="#1d2435" stroke="#f87171" stroke-width="0.75" stroke-dasharray="4 2"/>
  <text x="516" y="416" text-anchor="middle" class="sans nm" fill="#f87171" font-size="11">DB VM (not deployed in lab)</text>
  <text x="516" y="430" text-anchor="middle" class="row" fill="#64748b">Reserved · 10.1.2.4 when deployed</text>

  <!-- nsg-db rules ref -->
  <rect x="396" y="450" width="240" height="30" rx="6" fill="#1c0909" stroke="#f87171" stroke-width="0.5"/>
  <text x="516" y="464" text-anchor="middle" class="row" fill="#fca5a5" font-weight="600">SQL 1433 from 10.1.1.0/24 only</text>
  <text x="516" y="476" text-anchor="middle" class="row" fill="#64748b">All Internet denied · see Diagram 2</text>

  <!-- SQL arrow snet-web → snet-db -->
  <line x1="516" y1="360" x2="516" y2="398" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <text x="528" y="382" class="row" fill="#92400e">SQL 1433</text>

  <!-- ── VNET PEERING (below both VNets) ── -->
  <rect x="258" y="540" width="164" height="48" rx="24" fill="#1d2435" stroke="#4a9eff" stroke-width="1"/>
  <text x="340" y="558" text-anchor="middle" class="sans" fill="#93c5fd" font-size="11" font-weight="600">VNet Peering</text>
  <text x="340" y="572" text-anchor="middle" class="row" fill="#64748b">hub-to-spoke · spoke-to-hub</text>
  <text x="340" y="584" text-anchor="middle" class="row" fill="#34d399">✓ FullyInSync · Connected</text>

  <!-- peering arrows up to hub and spoke anchor pills -->
  <line x1="278" y1="545" x2="164" y2="528" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="402" y1="545" x2="516" y2="528" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- hub bottom anchor pill -->
  <rect x="100" y="510" width="128" height="18" rx="9" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="164" y="523" text-anchor="middle" class="row" fill="#93c5fd">vnet-hub-dev-wus3-01</text>

  <!-- spoke bottom anchor pill -->
  <rect x="452" y="510" width="128" height="18" rx="9" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="516" y="523" text-anchor="middle" class="row" fill="#5eead4">vnet-spoke-dev-wus3-01</text>

  <!-- lines from VNet boxes down to anchor pills -->
  <line x1="164" y1="518" x2="164" y2="510" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
  <line x1="516" y1="518" x2="516" y2="510" stroke="#2dd4bf" stroke-width="1" opacity="0.4"/>

  <!-- ── LEGEND ── -->
  <rect x="16" y="600" width="648" height="22" rx="6" fill="#161b27" stroke="#2a3347" stroke-width="0.5"/>
  <rect x="28" y="607" width="7" height="7" rx="2" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1"/>
  <text x="40" y="616" class="row" fill="#64748b">Hub VNet</text>
  <rect x="98" y="607" width="7" height="7" rx="2" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
  <text x="110" y="616" class="row" fill="#64748b">Spoke VNet</text>
  <rect x="176" y="607" width="7" height="7" rx="2" fill="#92400e" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="188" y="616" class="row" fill="#64748b">NSG boundary</text>
  <line x1="264" y1="611" x2="280" y2="611" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="285" y="616" class="row" fill="#64748b">Allowed</text>
  <line x1="336" y1="611" x2="352" y2="611" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="357" y="616" class="row" fill="#64748b">Denied</text>
  <line x1="400" y1="611" x2="416" y2="611" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="421" y="616" class="row" fill="#64748b">Peering / Bastion</text>
  <text x="530" y="616" class="row" fill="#334155">hub 10.0.0.0/16 · spoke 10.1.0.0/16</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="626" width="680" height="14" fill="#161b27"/>
  <rect x="0" y="626" width="680" height="1" fill="#2a3347"/>
  <text x="340" y="637" text-anchor="middle" class="cap sans" font-size="9">ostebovik.net · AZ-104 · Project 3 · Hub-Spoke Topology · westus3</text>
</svg>

<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>Azure Load Balancer Architecture — Project 5</title>
  <desc>Architecture diagram showing public internet traffic flowing through pip-lb-web to Standard Load Balancer lb-web, through health probe and load balancing rules, distributing to vm-web-01 and vm-web-02 in an availability set across fault domains 0 and 1 in vnet-spoke snet-web. Outbound SNAT via pip-lb-outbound is also shown.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'IBM Plex Mono', 'Consolas', monospace; }
      .sans { font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
      .cap  { font-size: 10px; fill: #64748b; letter-spacing: 0.08em; }
      .nm   { font-size: 12px; font-weight: 500; }
      .sub  { font-size: 10px; }
      .row  { font-size: 10px; }
    </style>
  </defs>

  <!-- page bg -->
  <rect width="900" height="660" fill="#0f1117"/>

  <!-- header stripe — blue for networking -->
  <rect x="0" y="0" width="900" height="3" fill="#4a9eff"/>

  <!-- header -->
  <rect x="0" y="3" width="900" height="44" fill="#161b27"/>
  <rect x="0" y="47" width="900" height="1" fill="#2a3347"/>
  <text x="20" y="28" class="sans nm" fill="#e2e8f0" font-size="13" font-weight="600">AZ-104 · Phase 2 · Project 5</text>
  <text x="20" y="42" class="sub" fill="#64748b">Load Balancer · Standard SKU · Round-robin · Health probe · Outbound SNAT</text>
  <rect x="698" y="12" width="182" height="22" rx="11" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="789" y="27" text-anchor="middle" class="sub" fill="#93c5fd">phase-2 · project-5</text>

  <!-- ── INTERNET CLOUD ── -->
  <g transform="translate(338,58)">
    <ellipse cx="62" cy="26" rx="56" ry="20" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="34" cy="30" rx="28" ry="14" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="88" cy="30" rx="24" ry="13" fill="#1d2435" stroke="#2a3347" stroke-width="1"/>
    <rect x="10" y="28" width="104" height="14" fill="#1d2435"/>
    <text x="62" y="37" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="'Syne',sans-serif">Internet</text>
  </g>

  <!-- Inbound arrow Internet → pip -->
  <line x1="450" y1="106" x2="450" y2="148" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="340" y="110" width="118" height="16" rx="8" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="399" y="122" text-anchor="middle" fill="#86efac" font-size="10" font-weight="500">http://20.171.241.228</text>

  <!-- ── PUBLIC IPs ROW ── -->

  <!-- pip-lb-web -->
  <rect x="300" y="148" width="168" height="60" rx="8" fill="#1d2435" stroke="#4a9eff" stroke-width="1"/>
  <rect x="300" y="148" width="168" height="3" rx="2" fill="#4a9eff"/>
  <text x="384" y="168" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="11">pip-lb-web</text>
  <text x="384" y="183" text-anchor="middle" class="sub" fill="#4a9eff">20.171.241.228</text>
  <text x="384" y="198" text-anchor="middle" class="row" fill="#64748b">Inbound frontend</text>

  <!-- pip-lb-outbound -->
  <rect x="490" y="148" width="168" height="60" rx="8" fill="#1d2435" stroke="#f59e0b" stroke-width="1"/>
  <rect x="490" y="148" width="168" height="3" rx="2" fill="#f59e0b"/>
  <text x="574" y="168" text-anchor="middle" class="sans nm" fill="#fcd34d" font-size="11">pip-lb-outbound</text>
  <text x="574" y="183" text-anchor="middle" class="sub" fill="#f59e0b">Dynamic public IP</text>
  <text x="574" y="198" text-anchor="middle" class="row" fill="#64748b">Outbound SNAT only</text>

  <!-- ── LOAD BALANCER ── -->
  <rect x="200" y="232" width="500" height="140" rx="10" fill="#1d2435" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="200" y="232" width="500" height="3" rx="2" fill="#4a9eff"/>
  <text x="270" y="253" class="sans nm" fill="#93c5fd" font-size="13" font-weight="600">lb-web</text>
  <text x="270" y="268" class="sub" fill="#64748b">Standard SKU · Public</text>

  <!-- Frontend IP configs -->
  <rect x="216" y="276" width="160" height="38" rx="6" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.75"/>
  <text x="296" y="292" text-anchor="middle" class="sub" fill="#93c5fd">fe-web (inbound)</text>
  <text x="296" y="306" text-anchor="middle" class="row" fill="#64748b">LoadBalancerFrontEnd</text>

  <rect x="394" y="276" width="160" height="38" rx="6" fill="#1c1209" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="474" y="292" text-anchor="middle" class="sub" fill="#fcd34d">fe-outbound</text>
  <text x="474" y="306" text-anchor="middle" class="row" fill="#64748b">Outbound SNAT rule</text>

  <!-- Health probe + LB rule -->
  <rect x="216" y="322" width="148" height="36" rx="6" fill="#14532d" stroke="#34d399" stroke-width="0.75"/>
  <text x="290" y="337" text-anchor="middle" class="sub" fill="#86efac">probe-http</text>
  <text x="290" y="350" text-anchor="middle" class="row" fill="#64748b">HTTP:80 / every 15s</text>

  <rect x="380" y="322" width="148" height="36" rx="6" fill="#14532d" stroke="#34d399" stroke-width="0.75"/>
  <text x="454" y="337" text-anchor="middle" class="sub" fill="#86efac">rule-http</text>
  <text x="454" y="350" text-anchor="middle" class="row" fill="#64748b">TCP 80→80 · Default</text>

  <!-- pip-lb-web → LB fe-web -->
  <line x1="384" y1="208" x2="320" y2="276" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <!-- pip-lb-outbound → LB fe-outbound -->
  <line x1="530" y1="208" x2="490" y2="276" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- NSG rules card -->
  <rect x="574" y="232" width="120" height="100" rx="8" fill="#1c1209" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="634" y="250" text-anchor="middle" class="sub" fill="#fcd34d">nsg-web rules</text>
  <text x="582" y="265" class="row" fill="#86efac">✓ TCP 80  (p.100)</text>
  <text x="582" y="279" class="row" fill="#86efac">✓ TCP 443 (p.110)</text>
  <text x="582" y="293" class="row" fill="#86efac">✓ AzureLB (p.120)</text>
  <text x="582" y="307" class="row" fill="#86efac">✓ VirtNet  (p.150)</text>
  <text x="582" y="321" class="row" fill="#f87171">✗ RDP Int  (p.400)</text>

  <!-- ── VNET / SNET boundary ── -->
  <rect x="100" y="406" width="700" height="210" rx="12" fill="#161b27" stroke="#2dd4bf" stroke-width="1"/>
  <rect x="100" y="406" width="700" height="28" rx="12" fill="#134e4a"/>
  <rect x="100" y="420" width="700" height="14" fill="#134e4a"/>
  <text x="120" y="424" fill="#5eead4" font-size="12" font-weight="600" font-family="'Syne',sans-serif">vnet-spoke / snet-web  ·  10.1.1.0/24</text>
  <text x="786" y="424" text-anchor="end" fill="#2dd4bf" font-size="9" font-weight="600" letter-spacing=".06em">nsg-web applied</text>

  <!-- Availability set -->
  <rect x="118" y="444" width="664" height="162" rx="8" fill="rgba(74,158,255,0.04)" stroke="#4a9eff" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="136" y="462" fill="#93c5fd" font-size="11" font-weight="500" font-family="'Syne',sans-serif">avset-web — Availability set</text>
  <text x="136" y="476" class="row" fill="#64748b">2 fault domains · 2 update domains · Aligned managed disks</text>

  <!-- vm-web-01 -->
  <rect x="136" y="484" width="280" height="112" rx="8" fill="#1d2435" stroke="#4a9eff" stroke-width="1"/>
  <rect x="136" y="484" width="280" height="3" rx="2" fill="#4a9eff"/>
  <text x="276" y="503" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="12" font-weight="600">vm-web-01</text>
  <text x="276" y="517" text-anchor="middle" class="sub" fill="#64748b">Ubuntu 22.04 · B1s · Fault domain 0</text>
  <rect x="150" y="524" width="252" height="20" rx="4" fill="#242c40" stroke="#364259" stroke-width="0.5"/>
  <text x="276" y="538" text-anchor="middle" class="row" fill="#94a3b8">Private IP: 10.1.1.4</text>
  <rect x="150" y="548" width="252" height="20" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="276" y="562" text-anchor="middle" class="row" fill="#86efac">nginx running · port 80</text>
  <rect x="150" y="572" width="252" height="16" rx="3" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="276" y="584" text-anchor="middle" class="row" fill="#5eead4">Health probe: Healthy</text>

  <!-- vm-web-02 -->
  <rect x="484" y="484" width="280" height="112" rx="8" fill="#1d2435" stroke="#4a9eff" stroke-width="1"/>
  <rect x="484" y="484" width="280" height="3" rx="2" fill="#4a9eff"/>
  <text x="624" y="503" text-anchor="middle" class="sans nm" fill="#93c5fd" font-size="12" font-weight="600">vm-web-02</text>
  <text x="624" y="517" text-anchor="middle" class="sub" fill="#64748b">Ubuntu 22.04 · B1s · Fault domain 1</text>
  <rect x="498" y="524" width="252" height="20" rx="4" fill="#242c40" stroke="#364259" stroke-width="0.5"/>
  <text x="624" y="538" text-anchor="middle" class="row" fill="#94a3b8">Private IP: 10.1.1.5</text>
  <rect x="498" y="548" width="252" height="20" rx="4" fill="#14532d" stroke="#34d399" stroke-width="0.5"/>
  <text x="624" y="562" text-anchor="middle" class="row" fill="#86efac">nginx running · port 80</text>
  <rect x="498" y="572" width="252" height="16" rx="3" fill="#134e4a" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="624" y="584" text-anchor="middle" class="row" fill="#5eead4">Health probe: Healthy</text>

  <!-- LB → VM arrows -->
  <line x1="370" y1="372" x2="276" y2="484" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="372" x2="624" y2="484" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- be-web label -->
  <rect x="370" y="412" width="160" height="18" rx="9" fill="#1e3a5f" stroke="#4a9eff" stroke-width="0.5"/>
  <text x="450" y="425" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="500">be-web backend pool</text>

  <!-- Outbound SNAT path -->
  <path d="M 136 540 Q 60 440 300 210" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.7"/>
  <text x="66" y="388" class="row" fill="#f59e0b">Outbound</text>
  <text x="66" y="400" class="row" fill="#f59e0b">SNAT</text>
  <text x="66" y="412" class="row" fill="#64748b">(apt install)</text>

  <!-- ── LEGEND ── -->
  <rect x="100" y="624" width="700" height="28" rx="6" fill="#161b27" stroke="#2a3347" stroke-width="0.5"/>
  <rect x="116" y="633" width="8" height="8" rx="2" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1"/>
  <text x="130" y="641" class="row" fill="#64748b">LB component</text>
  <rect x="244" y="633" width="8" height="8" rx="2" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
  <text x="258" y="641" class="row" fill="#64748b">Backend VM in VNet</text>
  <rect x="400" y="633" width="8" height="8" rx="2" fill="#1c1209" stroke="#f59e0b" stroke-width="1"/>
  <text x="414" y="641" class="row" fill="#64748b">Outbound SNAT path</text>
  <rect x="560" y="633" width="8" height="8" rx="2" fill="#14532d" stroke="#34d399" stroke-width="1"/>
  <text x="574" y="641" class="row" fill="#64748b">Allowed traffic / healthy</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="652" width="900" height="8" fill="#161b27"/>
  <rect x="0" y="652" width="900" height="1" fill="#2a3347"/>
</svg>
